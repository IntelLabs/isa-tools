import lit.formats
import subprocess

lit_cfg_path = os.path.dirname(os.path.abspath(__file__))
isa_path = os.path.dirname(lit_cfg_path)
iii_bin_path = os.path.join(isa_path, "_build/install/default/bin/iii")
iic_path = os.path.join(isa_path, "_build/install/default/bin/iic")
backend = os.environ.get("ISA_BACKEND")
ac_types_dir = os.environ.get("AC_TYPES_DIR")
sc_types_dir = os.environ.get("SC_TYPES_DIR")
xdsl_isa_dir = os.environ.get("XDSL_ISA_DIR")
isa_CC = os.environ.get("ISA_CC", os.environ.get("ASL_CC"))

# Lit configuration
if backend is None:
    config.name = "ISA"
    backend = "fallback"
else:
    config.name = f"ISA backend {backend}"

if backend == "sc" and isa_CC is None:
    isa_CC = "g++"

config.test_format = lit.formats.ShTest("0")
config.suffixes = {".asl", ".isa"}
config.target_triple = ""

config.available_features = [backend]

proc = subprocess.run(["make", f"-C{isa_path}/runtime/test", "wide_bitint_supported"], capture_output=True, encoding='latin_1')
if proc.returncode == 0 and "1" in proc.stdout:
    config.available_features.append("wide_bitint")

config.substitutions.append(('%iii', iii_bin_path))
config.substitutions.append(('%aslrun', f"{iic_path} --backend={backend} -O0 --run"))
config.substitutions.append(('%aslopt', f"{iic_path} --show-final-isa"))
config.environment["ISA_DIR"] = isa_path
config.environment["ISA_PATH"] = f":{isa_path}:."
if ac_types_dir: config.environment["AC_TYPES_DIR"] = ac_types_dir
if sc_types_dir: config.environment["SC_TYPES_DIR"] = sc_types_dir
if xdsl_isa_dir: config.environment["XDSL_ISA_DIR"] = xdsl_isa_dir
if isa_CC: config.environment["CC"] = isa_CC
